<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="610" viewBox="0 0 1400 610" role="img" aria-labelledby="title desc">
  <title id="title">PaperAgent architecture</title>
  <desc id="desc">Academic papers are parsed, chunked, embedded, and indexed in FAISS. A query router selects deterministic retrieval or RAG with Ollama, then returns an answer with sources and timing.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: 400; fill: #64748b; }
      .label { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .detail { font-family: Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #64748b; text-anchor: middle; }
      .edge-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #475569; text-anchor: middle; }
      .line { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .box { stroke-width: 1.5; rx: 6; }
    </style>
  </defs>

  <rect width="1400" height="610" fill="#ffffff"/>
  <rect x="24" y="24" width="1352" height="562" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>

  <text x="70" y="84" class="title">PaperAgent Architecture</text>
  <text x="70" y="114" class="subtitle">Local academic knowledge base with hybrid query routing</text>

  <path class="line" d="M230 213 H270"/>
  <path class="line" d="M430 213 H470"/>
  <path class="line" d="M630 213 H670"/>
  <path class="line" d="M830 213 H870"/>
  <path class="line" d="M1030 213 H1070"/>

  <rect class="box" x="70" y="166" width="160" height="94" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="150" y="207" class="label">PDF Papers</text>
  <text x="150" y="232" class="detail">Private corpus</text>

  <rect class="box" x="270" y="166" width="160" height="94" fill="#f0fdfa" stroke="#2dd4bf"/>
  <text x="350" y="207" class="label">MinerU</text>
  <text x="350" y="232" class="detail">Document parsing</text>

  <rect class="box" x="470" y="166" width="160" height="94" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="550" y="207" class="label">Chunking</text>
  <text x="550" y="232" class="detail">Clean and split text</text>

  <rect class="box" x="670" y="166" width="160" height="94" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="750" y="207" class="label">BGE-M3</text>
  <text x="750" y="232" class="detail">Local embeddings</text>

  <rect class="box" x="870" y="166" width="160" height="94" fill="#fff7ed" stroke="#fb923c"/>
  <text x="950" y="207" class="label">FAISS</text>
  <text x="950" y="232" class="detail">Vector index</text>

  <rect class="box" x="1070" y="166" width="210" height="94" fill="#eff6ff" stroke="#2563eb"/>
  <text x="1175" y="207" class="label">Query Router</text>
  <text x="1175" y="232" class="detail">Select the fastest route</text>

  <path class="line" d="M1175 260 V310 H445 V350"/>
  <path class="line" d="M1175 260 V310 H925 V350"/>
  <text x="630" y="302" class="edge-label">Structured query</text>
  <text x="1038" y="302" class="edge-label">Open question</text>

  <rect class="box" x="285" y="350" width="320" height="108" fill="#ecfdf5" stroke="#34d399"/>
  <text x="445" y="391" class="label">Deterministic Retrieval</text>
  <text x="445" y="417" class="detail">Author · keyword · paper comparison</text>
  <text x="445" y="439" class="detail">No LLM required</text>

  <rect class="box" x="765" y="350" width="320" height="108" fill="#fff7ed" stroke="#fb923c"/>
  <text x="925" y="391" class="label">RAG + Ollama</text>
  <text x="925" y="417" class="detail">Context retrieval · fast / deep model</text>
  <text x="925" y="439" class="detail">Streaming generation</text>

  <path class="line" d="M605 404 H675 V509 H725"/>
  <path class="line" d="M1085 404 H1155 V509 H1125"/>

  <rect class="box" x="725" y="476" width="400" height="70" fill="#f1f5f9" stroke="#475569"/>
  <text x="925" y="507" class="label">Answer + Sources + Timing</text>
  <text x="925" y="530" class="detail">Traceable output with runtime diagnostics</text>
</svg>
